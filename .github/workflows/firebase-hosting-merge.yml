# Auto-deploy to Firebase Hosting when changes land on main.
# Target: healingplay project, site "thehealingplay" (from firebase.json).
name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # No build step: this is a plain static site (no package.json).
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HEALINGPLAY }}
          channelId: live
          projectId: healingplay
